<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
  <title>幸运大转盘 - 小胡鸭</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <header class="hero">
    <div class="hero-inner">
      <img class="hero-logo" src="assets/logo.png" width="200" height="80" alt="小胡鸭 XIAO HU DUCK" />
      <h1 class="hero-title">幸运大转盘</h1>
      <p class="hero-sub">转出好礼 · 鲜香味美</p>
    </div>
    <div class="hero-wave" aria-hidden="true"></div>
  </header>

  <section class="stage">
    <div class="stage-glow"></div>

    <div class="wheel-frame">
      <div class="wheel-outer-ring">
        <div class="wheel-wrap">
          <div class="pointer" aria-hidden="true">
            <svg viewBox="0 0 40 48" xmlns="http://www.w3.org/2000/svg">
              <defs>
                <linearGradient id="ptrGrad" x1="0" y1="0" x2="0" y2="1">
                  <stop offset="0%" stop-color="#ff8f4a"/>
                  <stop offset="100%" stop-color="#F25C19"/>
                </linearGradient>
              </defs>
              <polygon points="20,48 0,0 40,0" fill="url(#ptrGrad)" stroke="#fff" stroke-width="3" stroke-linejoin="round"/>
            </svg>
          </div>
          <canvas id="wheel" width="320" height="320" role="img" aria-label="抽奖转盘"></canvas>
          <div class="wheel-hub">
            <img src="assets/logo.png" alt="" width="120" height="48" decoding="async" />
          </div>
        </div>
      </div>
    </div>

    <button type="button" id="spinBtn" class="spin-btn">
      <span class="spin-btn__ico">🎯</span>
      <span class="spin-btn__txt">立即抽奖</span>
    </button>
    <p class="spin-hint">优惠券随机发放 · 以实际抽中为准</p>
  </section>

  <section class="prizes">
    <h2 class="prizes-title"><span class="prizes-icon">🎁</span> 奖品一览</h2>
    <ul class="prizes-list">
      <li class="prize-item" style="--c:#F25C19"><span class="prize-dot"></span>5元无门槛券</li>
      <li class="prize-item" style="--c:#FF8A5B"><span class="prize-dot"></span>香酥整鸭 8.5 折券</li>
      <li class="prize-item" style="--c:#FFB703"><span class="prize-dot"></span>满100元减25元</li>
      <li class="prize-item" style="--c:#FF922B"><span class="prize-dot"></span>220元礼包半价券</li>
      <li class="prize-item" style="--c:#E03131"><span class="prize-dot"></span>150元内免单券</li>
      <li class="prize-item" style="--c:#adb5bd"><span class="prize-dot"></span>谢谢惠顾</li>
    </ul>
  </section>

  <footer class="rules">
    <p>活动说明：优惠券到店出示即可使用 · 最终解释权归小胡鸭所有</p>
  </footer>

  <div id="overlay" class="overlay hidden" aria-hidden="true">
    <div class="overlay-card">
      <div class="overlay-brand">
        <img src="assets/logo.png" alt="" width="120" height="48" />
      </div>
      <div class="overlay-confetti" aria-hidden="true">
        <span></span><span></span><span></span><span></span><span></span>
      </div>
      <p class="congrats">恭喜您</p>
      <p id="prizeText" class="prize-text"></p>
      <p class="hint">截图保存，到店出示即可使用</p>
      <button type="button" id="closeOverlay" class="close-btn">收下好礼</button>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
